# docker-compose.yml
version: '3.8'

services:
  # قاعدة البيانات MySQL
  mysql:
    image: mysql:8.0
    container_name: money-transfer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_DATABASE:-money_transfer_db}
      MYSQL_USER: ${DB_USERNAME:-nestjs}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root123}
      TZ: Asia/Riyadh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # تطبيق NestJS
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: money-transfer-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-nestjs}
      DB_PASSWORD: ${DB_PASSWORD:-root123}
      DB_DATABASE: ${DB_DATABASE:-money_transfer_db}
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKey123}
      APP_PORT: 3000
      TZ: Asia/Riyadh
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./logs:/app/logs

  # أداة إدارة قاعدة البيانات (اختياري)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: money-transfer-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - app-network

volumes:
  mysql_data:
    driver: local

networks:
  app-network:
    driver: bridge